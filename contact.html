<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - SastaElectronics</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="shortcut icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="pageHeader"></div>
    <main style="padding-top:var(--header-height)">
        <div class="page-header">
            <h1 class="scroll-animate">Contact Us</h1>
            <p class="scroll-animate delay-1">We are here to help</p>
        </div>
        <div class="container section" style="padding-top:0">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:40px" class="checkout-grid stagger-children">
                <div class="scroll-animate">
                    <h2 style="font-size:1.5rem;font-weight:800;margin-bottom:24px">Get in Touch</h2>
                    <p style="color:var(--text-secondary);margin-bottom:32px;line-height:1.8">Questions about products,
                        order help, or feedback? We'd love to hear from you.</p>
                    <div style="display:flex;flex-direction:column;gap:16px">
                        <div class="glass-card scroll-animate delay-1"
                            style="display:flex;align-items:center;gap:16px;padding:20px">
                            <div
                                style="width:48px;height:48px;background:rgba(200,152,46,0.1);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--primary-dark);flex-shrink:0">
                                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <path
                                        d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.88.37 1.74.7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.82.33 1.68.57 2.56.7A2 2 0 0 1 22 16.92z" />
                                </svg></div>
                            <div>
                                <div style="font-weight:700;margin-bottom:2px">Phone</div>
                                <div style="color:var(--text-secondary);font-size:0.9rem">+92 300 1234567</div>
                            </div>
                        </div>
                        <div class="glass-card scroll-animate delay-2"
                            style="display:flex;align-items:center;gap:16px;padding:20px">
                            <div
                                style="width:48px;height:48px;background:rgba(15,157,88,0.1);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--accent);flex-shrink:0">
                                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <path
                                        d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                                    <polyline points="22,6 12,13 2,6" />
                                </svg></div>
                            <div>
                                <div style="font-weight:700;margin-bottom:2px">Email</div>
                                <div style="color:var(--text-secondary);font-size:0.9rem"><a
                                        href="/cdn-cgi/l/email-protection" class="__cf_email__"
                                        data-cfemail="2845494a4c5d4444494049465f495a101d684f45494144064b4745">[email&#160;protected]</a>
                                </div>
                            </div>
                        </div>
                        <div class="glass-card scroll-animate delay-3"
                            style="display:flex;align-items:center;gap:16px;padding:20px">
                            <div
                                style="width:48px;height:48px;background:rgba(30,41,59,0.1);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--secondary);flex-shrink:0">
                                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
                                    <circle cx="12" cy="10" r="3" />
                                </svg></div>
                            <div>
                                <div style="font-weight:700;margin-bottom:2px">Address</div>
                                <div style="color:var(--text-secondary);font-size:0.9rem">Shop #12, Electronics Market,
                                    Saddar, Karachi</div>
                            </div>
                        </div>
                        <div class="glass-card scroll-animate delay-4"
                            style="display:flex;align-items:center;gap:16px;padding:20px">
                            <div
                                style="width:48px;height:48px;background:rgba(221,154,26,0.1);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--warning);flex-shrink:0">
                                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <circle cx="12" cy="12" r="10" />
                                    <polyline points="12 6 12 12 16 14" />
                                </svg></div>
                            <div>
                                <div style="font-weight:700;margin-bottom:2px">Business Hours</div>
                                <div style="color:var(--text-secondary);font-size:0.9rem">Mon - Sat: 10:00 AM - 10:00 PM
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="glass-card scroll-animate delay-2">
                    <h3 style="margin-bottom:24px;font-weight:700">Send a Message</h3>
                    <form onsubmit="handleContact(event)">
                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
                            <div class="form-group"><label class="form-label">Name *</label><input type="text"
                                    class="form-input" id="cName" required placeholder="Full name"></div>
                            <div class="form-group"><label class="form-label">Email *</label><input type="email"
                                    class="form-input" id="cEmail" required placeholder="your@email.com"></div>
                        </div>
                        <div class="form-group"><label class="form-label">Subject *</label><input type="text"
                                class="form-input" id="cSubject" required placeholder="How can we help?"></div>
                        <div class="form-group"><label class="form-label">Phone</label><input type="tel"
                                class="form-input" id="cPhone" placeholder="03XX XXXXXXX (optional)"></div>
                        <div class="form-group"><label class="form-label">Message *</label><textarea class="form-input"
                                id="cMessage" rows="6" required placeholder="Write your message here..."
                                style="resize:vertical"></textarea></div>
                        <div id="contactStatus"
                            style="display:none;margin-bottom:16px;padding:12px;border-radius:var(--radius-md);font-size:0.9rem;font-weight:500">
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg w-full" id="contactBtn">Send
                            Message</button>
                    </form>
                </div>
            </div>
        </div>
    </main>
    <div id="pageFooter"></div>
    <script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script>
    <script src="js/data.js"></script>
    <script src="js/header-sync.js"></script>
    <script src="js/app.js"></script>
    <script src="js/scroll-animations.js"></script>
    <script>initPage('contact');
        async function handleContact(e) {
            e.preventDefault();
            const name = document.getElementById('cName').value.trim();
            const email = document.getElementById('cEmail').value.trim();
            const subject = document.getElementById('cSubject').value.trim();
            const phone = document.getElementById('cPhone').value.trim();
            const message = document.getElementById('cMessage').value.trim();
            const btn = document.getElementById('contactBtn');
            const statusDiv = document.getElementById('contactStatus');

            if (!name || !email || !subject || !message) {
                statusDiv.style.display = 'block';
                statusDiv.style.background = 'rgba(239,68,68,0.1)';
                statusDiv.style.border = '1px solid rgba(239,68,68,0.3)';
                statusDiv.style.color = 'var(--danger)';
                statusDiv.textContent = 'Please fill in all required fields.';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Sending...';
            statusDiv.style.display = 'none';

            const STORE_EMAIL = 'mabdullahanwar85@gmail.com';

            try {
                const response = await fetch('https://formsubmit.co/ajax/' + STORE_EMAIL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({
                        name: name,
                        email: email,
                        phone: phone || 'Not provided',
                        subject: 'Contact Form: ' + subject,
                        message: 'New message from ' + name + ' (' + email + ')\n\nPhone: ' + (phone || 'Not provided') + '\n\nMessage:\n' + message,
                        _subject: 'Contact Form: ' + subject + ' - SastaElectronics',
                        _template: 'table',
                        _captcha: 'false'
                    })
                });

                const data = await response.json();

                if (data.success) {
                    statusDiv.style.display = 'block';
                    statusDiv.style.background = 'rgba(15,157,88,0.1)';
                    statusDiv.style.border = '1px solid rgba(15,157,88,0.3)';
                    statusDiv.style.color = 'var(--accent)';
                    statusDiv.textContent = 'Message sent successfully! We will get back to you soon.';
                    e.target.reset();
                    showToast('Message sent!', 'success');
                } else {
                    throw new Error('Failed to send');
                }
            } catch (err) {
                statusDiv.style.display = 'block';
                statusDiv.style.background = 'rgba(245,158,11,0.1)';
                statusDiv.style.border = '1px solid rgba(245,158,11,0.3)';
                statusDiv.style.color = 'var(--warning)';
                statusDiv.textContent = 'Message saved locally. We will contact you soon.';
                showToast('Message saved!', 'warning');

                // Save locally as fallback
                const messages = JSON.parse(localStorage.getItem('sasta_contact_messages') || '[]');
                messages.push({ name, email, phone, subject, message, date: new Date().toISOString(), status: 'pending' });
                localStorage.setItem('sasta_contact_messages', JSON.stringify(messages));
                e.target.reset();
            }

            btn.disabled = false;
            btn.textContent = 'Send Message';
        }</script>
</body>

</html>
