<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - SastaElectronics</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>
    <div id="pageHeader"></div>
    <main style="padding-top:var(--header-height)">
        <div class="container"
            style="display:flex;align-items:center;justify-content:center;min-height:calc(100vh - var(--header-height) - 100px)">
            <div style="text-align:center">
                <div
                    style="font-size:8rem;font-weight:900;background:linear-gradient(135deg,var(--primary),var(--primary-dark));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:16px">
                    404</div>
                <h1 style="font-size:2rem;margin-bottom:12px;font-weight:800">Page Not Found</h1>
                <p
                    style="color:var(--text-secondary);font-size:1.1rem;margin-bottom:36px;max-width:480px;margin-left:auto;margin-right:auto">
                    The page you're looking for might have been removed or is temporarily unavailable.</p>
                <div style="display:flex;gap:16px;justify-content:center;flex-wrap:wrap">
                    <a href="index.html" class="btn btn-primary btn-lg">Go Home</a>
                    <a href="shop.html" class="btn btn-secondary btn-lg">Browse Products</a>
                </div>
            </div>
        </div>
    </main>
    <div id="pageFooter"></div>
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script>initPage('');</script>
</body>

</html>
