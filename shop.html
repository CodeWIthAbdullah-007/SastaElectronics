<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - SastaElectronics</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>
    <div id="pageHeader"></div>
    <main style="padding-top:var(--header-height)">
        <div class="container section">
            <div class="breadcrumb"><a href="index.html">Home</a><span class="breadcrumb-sep">/</span><span>Shop</span>
            </div>
            <div class="flex-between mb-3 flex-wrap" style="gap:16px">
                <div>
                    <h1 style="font-size:1.8rem;font-weight:800" id="shopTitle">All Products</h1>
                    <p style="color:var(--text-secondary);font-size:0.95rem" id="resultCount"></p>
                </div>
                <select class="form-select" id="sortSelect" style="width:220px;background:#fff">
                    <option value="newest">Sort by: Newest</option>
                    <option value="price-low">Price: Low to High</option>
                    <option value="price-high">Price: High to Low</option>
                    <option value="rating">Highest Rated</option>
                    <option value="name-az">Name: A to Z</option>
                </select>
            </div>
            <div style="display:grid;grid-template-columns:280px 1fr;gap:24px" id="shopLayout">
                <aside class="sidebar-filters" id="filtersPanel">
                    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
                        <h3 style="font-size:1.1rem;font-weight:700">Filters</h3>
                        <button class="btn btn-sm btn-secondary" onclick="clearFilters()">Clear All</button>
                    </div>
                    <div class="filter-group">
                        <h4 class="filter-group-title">Categories</h4>
                        <div id="categoryFilters"></div>
                    </div>
                    <div class="filter-group">
                        <h4 class="filter-group-title">Brands</h4>
                        <div id="brandFilters" style="max-height:200px;overflow-y:auto"></div>
                    </div>
                    <div class="filter-group">
                        <h4 class="filter-group-title">Price Range</h4>
                        <div class="price-range-inputs">
                            <input type="number" placeholder="Min" id="minPrice" min="0">
                            <span style="color:var(--text-muted)">—</span>
                            <input type="number" placeholder="Max" id="maxPrice" min="0">
                        </div>
                        <button class="btn btn-sm btn-primary w-full mt-2" onclick="applyFilters()">Apply Price</button>
                    </div>
                    <div class="filter-group">
                        <h4 class="filter-group-title">Rating</h4>
                        <div id="ratingFilters"></div>
                    </div>
                </aside>
                <div>
                    <div class="grid grid-3" id="productsGrid"></div>
                    <div id="emptyState" style="display:none" class="empty-state">
                        <div class="empty-state-icon"><svg viewBox="0 0 24 24" width="36" height="36" fill="none"
                                stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8" />
                                <path d="m21 21-4.35-4.35" />
                            </svg></div>
                        <h3>No products found</h3>
                        <p>Try adjusting your filters</p>
                        <button class="btn btn-primary" onclick="clearFilters()">Clear Filters</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <div id="pageFooter"></div>
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script>
        initPage('shop');
        const urlCat = getUrlParam('category');
        const urlSearch = getUrlParam('search');
        let currentFilters = { category: urlCat || '', brand: [], minPrice: null, maxPrice: null, minRating: null, sort: 'newest', search: urlSearch || '' };

        if (urlSearch) document.getElementById('shopTitle').textContent = `Results for "${urlSearch}"`;
        else if (urlCat) document.getElementById('shopTitle').textContent = getCategoryName(urlCat);

        document.getElementById('categoryFilters').innerHTML = getCategories().map(cat => `
      <label class="filter-option"><input type="checkbox" value="${cat.id}" onchange="toggleCategoryFilter('${cat.id}')" ${urlCat === cat.id ? 'checked' : ''}> ${cat.name}</label>
    `).join('');
        document.getElementById('brandFilters').innerHTML = getBrands().map(b => `
      <label class="filter-option"><input type="checkbox" value="${b}" onchange="toggleBrandFilter('${b}')"> ${b}</label>
    `).join('');
        document.getElementById('ratingFilters').innerHTML = [4, 3, 2, 1].map(r => `
      <label class="filter-option"><input type="radio" name="rating" value="${r}" onchange="setRatingFilter(${r})"> ${r}+ Stars</label>
    `).join('');
        document.getElementById('sortSelect').addEventListener('change', e => { currentFilters.sort = e.target.value; renderProducts(); });

        function toggleCategoryFilter(c) { currentFilters.category = currentFilters.category === c ? '' : c; renderProducts(); }
        function toggleBrandFilter(b) { const i = currentFilters.brand.indexOf(b); i >= 0 ? currentFilters.brand.splice(i, 1) : currentFilters.brand.push(b); renderProducts(); }
        function setRatingFilter(r) { currentFilters.minRating = r; renderProducts(); }
        function applyFilters() { currentFilters.minPrice = document.getElementById('minPrice').value ? Number(document.getElementById('minPrice').value) : null; currentFilters.maxPrice = document.getElementById('maxPrice').value ? Number(document.getElementById('maxPrice').value) : null; renderProducts(); }
        function clearFilters() {
            currentFilters = { category: '', brand: [], minPrice: null, maxPrice: null, minRating: null, sort: 'newest', search: '' };
            document.querySelectorAll('#filtersPanel input').forEach(i => { i.checked = false; if (i.type === 'number') i.value = ''; });
            document.getElementById('shopTitle').textContent = 'All Products';
            renderProducts();
        }

        function renderProducts() {
            const results = filterProducts(currentFilters);
            const grid = document.getElementById('productsGrid');
            const empty = document.getElementById('emptyState');
            document.getElementById('resultCount').textContent = `${results.length} products found`;
            if (results.length === 0) { grid.style.display = 'none'; empty.style.display = 'block'; }
            else { grid.style.display = 'grid'; empty.style.display = 'none'; grid.innerHTML = results.map(renderProductCard).join(''); }
        }
        renderProducts();
    </script>
</body>

</html>
