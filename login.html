<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SastaElectronics</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
</head>

<body>
    <div id="pageHeader"></div>

    <main style="padding-top:var(--header-height)">
        <div class="container"
            style="display:flex;align-items:center;justify-content:center;min-height:calc(100vh - var(--header-height) - 100px)">
            <div class="glass-card scroll-animate" style="max-width:440px;width:100%;padding:40px">

                <!-- Login Type Tabs -->
                <div
                    style="display:flex;gap:8px;margin-bottom:32px;background:var(--bg-secondary);padding:6px;border-radius:var(--radius-full)">
                    <button class="btn" id="userLoginTab" style="flex:1;background:var(--primary);color:#fff"
                        onclick="switchLoginType('user')">
                        👤 User Login
                    </button>
                    <button class="btn" id="adminLoginTab"
                        style="flex:1;background:transparent;color:var(--text-secondary)"
                        onclick="switchLoginType('admin')">
                        🔒 Admin Login
                    </button>
                </div>

                <!-- User Login Form -->
                <div id="userLoginForm">
                    <div style="text-align:center;margin-bottom:32px">
                        <div
                            style="width:64px;height:64px;margin:0 auto 16px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));border-radius:50%;display:flex;align-items:center;justify-content:center;animation:float 3s ease-in-out infinite">
                            <svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="#fff" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                                <circle cx="12" cy="7" r="4" />
                            </svg>
                        </div>
                        <h1 style="font-size:1.8rem;font-weight:800;margin-bottom:8px">Welcome Back</h1>
                        <p style="color:var(--text-secondary)">Sign in to your account</p>
                    </div>

                    <form onsubmit="handleLogin(event)">
                        <div class="form-group scroll-animate delay-1">
                            <label class="form-label">Email Address *</label>
                            <input type="email" class="form-input" id="loginEmail" placeholder="your@email.com"
                                required>
                        </div>
                        <div class="form-group scroll-animate delay-2">
                            <label class="form-label">Password *</label>
                            <input type="password" class="form-input" id="loginPassword"
                                placeholder="Enter your password" required>
                        </div>

                        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px"
                            class="scroll-animate delay-2">
                            <label class="filter-option" style="padding:0;border:none;margin:0">
                                <input type="checkbox" id="rememberMe">
                                <span style="font-size:0.88rem">Remember me</span>
                            </label>
                            <a href="forgot-password.html"
                                style="font-size:0.88rem;font-weight:600;color:var(--primary-dark)">Forgot password?</a>
                        </div>

                        <div id="loginError"
                            style="display:none;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:var(--radius-md);padding:12px;margin-bottom:16px;color:var(--danger);font-size:0.9rem">
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-full scroll-animate delay-3"
                            id="loginBtn">Sign In</button>
                    </form>

                    <div style="margin-top:24px;text-align:center">
                        <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
                            <div style="flex:1;height:1px;background:var(--border-light)"></div>
                            <span style="color:var(--text-muted);font-size:0.85rem">or</span>
                            <div style="flex:1;height:1px;background:var(--border-light)"></div>
                        </div>
                        <p style="color:var(--text-secondary);font-size:0.95rem">
                            Don't have an account? <a href="signup.html" style="font-weight:700">Create Account</a>
                        </p>
                    </div>
                </div>

                <!-- Admin Login Form -->
                <div id="adminLoginForm" style="display:none">
                    <div style="text-align:center;margin-bottom:32px">
                        <div
                            style="width:64px;height:64px;margin:0 auto 16px;background:linear-gradient(135deg,var(--warning),#d97706);border-radius:50%;display:flex;align-items:center;justify-content:center;animation:float 3s ease-in-out infinite">
                            <svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="#fff" stroke-width="2">
                                <path
                                    d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                        </div>
                        <h1 style="font-size:1.8rem;font-weight:800;margin-bottom:8px">Admin Access</h1>
                        <p style="color:var(--text-secondary)">Sign in to manage orders</p>
                    </div>

                    <form onsubmit="handleAdminLogin(event)">
                        <div class="form-group">
                            <label class="form-label">Username *</label>
                            <input type="text" class="form-input" id="adminUsername" placeholder="Enter username"
                                required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Password *</label>
                            <input type="password" class="form-input" id="adminPassword"
                                placeholder="Enter admin password" required>
                        </div>

                        <div id="adminLoginError"
                            style="display:none;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:var(--radius-md);padding:12px;margin-bottom:16px;color:var(--danger);font-size:0.9rem">
                        </div>

                        <button type="submit" class="btn btn-lg w-full" id="adminLoginBtn"
                            style="background:linear-gradient(135deg,var(--warning),#d97706);color:#fff;box-shadow:0 4px 16px rgba(245,158,11,0.3)">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
                                stroke-width="2" style="vertical-align:middle;margin-right:8px">
                                <path
                                    d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                            Admin Sign In
                        </button>
                    </form>

                    <div
                        style="margin-top:24px;text-align:center;padding-top:20px;border-top:1px solid var(--border-light)">
                        <p style="color:var(--text-muted);font-size:0.85rem">
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"
                                stroke-width="2" style="vertical-align:middle;margin-right:4px">
                                <path
                                    d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                            </svg>
                            Authorized personnel only
                        </p>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <div id="pageFooter"></div>

    <script src="js/data.js"></script>
    <script src="js/header-sync.js"></script>
    <script src="js/app.js"></script>
    <script src="js/admin-config.js"></script>
    <script src="js/scroll-animations.js"></script>
    <script>
        initPage('home');

        // Clear any old admin credentials
        localStorage.removeItem('admin_credentials');

        // Switch between User and Admin login
        function switchLoginType(type) {
            const userForm = document.getElementById('userLoginForm');
            const adminForm = document.getElementById('adminLoginForm');
            const userTab = document.getElementById('userLoginTab');
            const adminTab = document.getElementById('adminLoginTab');

            if (type === 'user') {
                userForm.style.display = 'block';
                adminForm.style.display = 'none';
                userTab.style.background = 'var(--primary)';
                userTab.style.color = '#fff';
                adminTab.style.background = 'transparent';
                adminTab.style.color = 'var(--text-secondary)';
            } else {
                userForm.style.display = 'none';
                adminForm.style.display = 'block';
                adminTab.style.background = 'var(--warning)';
                adminTab.style.color = '#fff';
                userTab.style.background = 'transparent';
                userTab.style.color = 'var(--text-secondary)';
            }
        }

        // Handle User Login
        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');
            const btn = document.getElementById('loginBtn');

            errorDiv.style.display = 'none';

            if (!email || !password) {
                errorDiv.textContent = 'Please fill in all fields';
                errorDiv.style.display = 'block';
                return;
            }

            btn.disabled = true; btn.textContent = 'Signing In...';

            if (!supabaseClient) {
                errorDiv.innerHTML = '<strong>Supabase not connected!</strong><br>Please check your internet connection or refresh the page.';
                errorDiv.style.display = 'block';
                btn.disabled = false; btn.textContent = 'Sign In';
                return;
            }

            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) {
                    errorDiv.textContent = error.message;
                    errorDiv.style.display = 'block';
                    btn.disabled = false; btn.textContent = 'Sign In';
                    return;
                }
                localStorage.setItem('sasta_current_user', JSON.stringify({ id: data.user.id, email: data.user.email, ...data.user.user_metadata }));
                showToast('Login successful!', 'success');
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
            } catch (err) {
                errorDiv.textContent = err.message || 'Login failed';
                errorDiv.style.display = 'block';
                btn.disabled = false; btn.textContent = 'Sign In';
            }
        }

        // Handle Admin Login
        function handleAdminLogin(e) {
            e.preventDefault();
            const username = document.getElementById('adminUsername').value.trim();
            const password = document.getElementById('adminPassword').value;
            const errorDiv = document.getElementById('adminLoginError');
            const btn = document.getElementById('adminLoginBtn');

            errorDiv.style.display = 'none';

            console.log('Admin login attempt:', { username, password });
            console.log('Expected:', ADMIN_CREDENTIALS);

            if (username === ADMIN_CREDENTIALS.username && password === ADMIN_CREDENTIALS.password) {
                localStorage.setItem('admin_logged_in', 'true');
                localStorage.setItem('admin_session_start', new Date().toISOString());
                showToast('Admin login successful!', 'success');
                setTimeout(() => {
                    window.location.href = 'admin.html';
                }, 800);
            } else {
                errorDiv.textContent = 'Invalid username or password. Expected: Admin / faheelkhan@007';
                errorDiv.style.display = 'block';
                console.log('Login failed. Got:', { username, password });
            }
        }

        // Check if already logged in
        (async function () {
            if (sessionStorage.getItem('justLoggedOut') === 'true') {
                sessionStorage.removeItem('justLoggedOut');
                return;
            }
            if (typeof supabaseClient !== 'undefined' && supabaseClient) {
                try {
                    const { data } = await supabaseClient.auth.getSession();
                    if (data && data.session && data.session.user) {
                        window.location.href = 'dashboard.html';
                        return;
                    }
                } catch (e) { }
            }
            const localUser = localStorage.getItem('sasta_current_user');
            if (localUser && !supabaseClient) {
                try {
                    JSON.parse(localUser);
                    window.location.href = 'dashboard.html';
                } catch (e) { }
            }
        })();
    </script>
</body>

</html>
