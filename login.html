<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SastaElectronics</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>
    <div id="pageHeader"></div>
    <main style="padding-top:var(--header-height)">
        <div class="container"
            style="display:flex;align-items:center;justify-content:center;min-height:calc(100vh - var(--header-height) - 100px)">
            <div class="glass-card" style="max-width:440px;width:100%;padding:40px">
                <div style="text-align:center;margin-bottom:32px">
                    <div
                        style="width:60px;height:60px;margin:0 auto 16px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));border-radius:50%;display:flex;align-items:center;justify-content:center">
                        <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="#fff" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                        </svg>
                    </div>
                    <h1 style="font-size:1.6rem;font-weight:800;margin-bottom:6px">Welcome Back</h1>
                    <p style="color:var(--text-secondary)">Sign in to your account</p>
                </div>
                <form onsubmit="handleLogin(event)">
                    <div class="form-group"><label class="form-label">Email Address</label><input type="email"
                            class="form-input" id="loginEmail" placeholder="your@email.com" required></div>
                    <div class="form-group"><label class="form-label">Password</label><input type="password"
                            class="form-input" id="loginPassword" placeholder="Enter your password" required></div>
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
                        <label class="filter-option" style="padding:0;border:none;margin:0"><input type="checkbox">
                            <span style="font-size:0.88rem">Remember me</span></label>
                        <a href="#" style="font-size:0.88rem;font-weight:600">Forgot password?</a>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-full">Sign In</button>
                </form>
                <p style="text-align:center;margin-top:24px;color:var(--text-secondary)">Don't have an account? <a
                        href="signup.html" style="font-weight:700">Create Account</a></p>
            </div>
        </div>
    </main>
    <div id="pageFooter"></div>
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script>
        initPage('home');
        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            if (!email || !password) { showToast('Please fill in all fields', 'error'); return; }
            const users = JSON.parse(localStorage.getItem('sasta_users') || '[]');
            const user = users.find(u => u.email === email && u.password === password);
            if (!user) { showToast('Invalid email or password', 'error'); return; }
            localStorage.setItem('sasta_current_user', JSON.stringify(user));
            showToast('Login successful!', 'success');
            setTimeout(() => window.location.href = 'dashboard.html', 1000);
        }
    </script>
</body>

</html>
