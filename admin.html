<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - SastaElectronics</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <style>
        /* Admin Specific Styles */
        .admin-header {
            background: linear-gradient(135deg, var(--secondary) 0%, #2d3a4f 100%);
            padding: 32px 0;
            margin-bottom: 32px;
            position: relative;
            overflow: hidden;
        }

        .admin-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(200, 152, 46, 0.1) 0%, transparent 70%);
            border-radius: 50%;
        }

        .admin-header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            position: relative;
            z-index: 1;
        }

        .admin-title-section h1 {
            font-size: 2rem;
            font-weight: 900;
            color: #fff;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .admin-title-section p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1rem;
            margin: 0;
        }

        .admin-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .admin-btn {
            padding: 12px 24px;
            border-radius: var(--radius-full);
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            border: none;
            transition: all var(--transition-fast);
        }

        .admin-btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
            box-shadow: 0 4px 16px rgba(200, 152, 46, 0.3);
        }

        .admin-btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(200, 152, 46, 0.4);
        }

        .admin-btn-danger {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1.5px solid rgba(255, 255, 255, 0.2);
        }

        .admin-btn-danger:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: var(--danger);
        }

        /* Tabs */
        .admin-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 32px;
            background: var(--bg-secondary);
            padding: 6px;
            border-radius: var(--radius-full);
            max-width: 400px;
        }

        .admin-tab {
            flex: 1;
            padding: 12px 24px;
            border-radius: var(--radius-full);
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            border: none;
            transition: all var(--transition-fast);
            background: transparent;
            color: var(--text-secondary);
        }

        .admin-tab.active {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 4px 12px rgba(200, 152, 46, 0.3);
        }

        .admin-tab:hover:not(.active) {
            color: var(--text-primary);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card-modern {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all var(--transition-fast);
            box-shadow: var(--shadow-sm);
        }

        .stat-card-modern:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .stat-icon {
            width: 56px;
            height: 56px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .stat-icon-pending {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning);
        }

        .stat-icon-confirmed {
            background: rgba(15, 157, 88, 0.1);
            color: var(--accent);
        }

        .stat-icon-cancelled {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        .stat-icon-total {
            background: rgba(200, 152, 46, 0.1);
            color: var(--primary);
        }

        .stat-info h3 {
            font-size: 1.8rem;
            font-weight: 900;
            margin-bottom: 4px;
            letter-spacing: -0.02em;
        }

        .stat-info p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin: 0;
            font-weight: 500;
        }

        /* Order Cards */
        .order-card-modern {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 16px;
            transition: all var(--transition-fast);
            box-shadow: var(--shadow-sm);
        }

        .order-card-modern:hover {
            box-shadow: var(--shadow-md);
        }

        .order-card-modern.pending {
            border-left: 4px solid var(--warning);
        }

        .order-card-modern.confirmed {
            border-left: 4px solid var(--accent);
        }

        .order-card-modern.cancelled {
            border-left: 4px solid var(--danger);
        }

        .order-header-modern {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .order-id-section h3 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .order-date {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .order-total-section {
            text-align: right;
        }

        .order-total {
            font-size: 1.3rem;
            font-weight: 900;
            color: var(--primary-dark);
        }

        .order-customer {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .order-status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: var(--radius-full);
            font-size: 0.8rem;
            font-weight: 700;
            margin-top: 8px;
        }

        .status-pending {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning);
        }

        .status-confirmed {
            background: rgba(15, 157, 88, 0.1);
            color: var(--accent);
        }

        .status-cancelled {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        .order-details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
            padding: 16px;
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
        }

        .order-detail-item {
            font-size: 0.9rem;
        }

        .order-detail-item strong {
            color: var(--text-primary);
            font-weight: 600;
        }

        .order-detail-item span {
            color: var(--text-secondary);
        }

        .order-items-list {
            margin-bottom: 16px;
        }

        .order-item-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-light);
        }

        .order-item-row:last-child {
            border-bottom: none;
        }

        .order-item-image {
            width: 56px;
            height: 56px;
            border-radius: var(--radius-sm);
            overflow: hidden;
            background: var(--bg-secondary);
            flex-shrink: 0;
        }

        .order-item-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .order-item-info {
            flex: 1;
        }

        .order-item-name {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 4px;
        }

        .order-item-qty {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .order-item-price {
            font-weight: 700;
            font-size: 1rem;
            color: var(--primary-dark);
        }

        .order-actions {
            display: flex;
            gap: 12px;
            padding-top: 16px;
            border-top: 1px solid var(--border-light);
        }

        .order-action-btn {
            flex: 1;
            padding: 12px 20px;
            border-radius: var(--radius-full);
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all var(--transition-fast);
        }

        .btn-confirm {
            background: linear-gradient(135deg, var(--accent), #059669);
            color: #fff;
        }

        .btn-confirm:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(15, 157, 88, 0.3);
        }

        .btn-cancel-order {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1.5px solid rgba(239, 68, 68, 0.3);
        }

        .btn-cancel-order:hover {
            background: var(--danger);
            color: #fff;
        }

        /* Product Cards */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .product-card-admin {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: all var(--transition-fast);
            box-shadow: var(--shadow-sm);
        }

        .product-card-admin:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .product-card-admin-image {
            height: 200px;
            background: var(--bg-secondary);
            overflow: hidden;
        }

        .product-card-admin-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-card-admin-body {
            padding: 20px;
        }

        .product-card-admin-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            font-weight: 700;
            background: rgba(200, 152, 46, 0.1);
            color: var(--primary-dark);
            margin-bottom: 12px;
        }

        .product-card-admin-name {
            font-size: 1.05rem;
            font-weight: 700;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .product-card-admin-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .product-card-admin-price {
            font-size: 1.2rem;
            font-weight: 900;
            color: var(--primary-dark);
            margin-bottom: 16px;
        }

        .product-card-admin-actions {
            display: flex;
            gap: 8px;
        }

        .product-delete-btn {
            flex: 1;
            padding: 10px;
            border-radius: var(--radius-full);
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .product-delete-btn:hover {
            background: var(--danger);
            color: #fff;
        }

        /* Empty State */
        .empty-state-modern {
            text-align: center;
            padding: 80px 20px;
        }

        .empty-state-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background: var(--bg-secondary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
        }

        .empty-state-modern h3 {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .empty-state-modern p {
            color: var(--text-secondary);
            margin-bottom: 24px;
        }

        /* Modal */
        .modal-overlay-modern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay-modern.open {
            display: flex;
        }

        .modal-content-modern {
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            padding: 32px;
            max-width: 600px;
            width: 100%;
            box-shadow: var(--shadow-xl);
            max-height: 90vh;
            overflow-y: auto;
            animation: modalSlideIn 0.3s ease;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .modal-header-modern {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-header-modern h2 {
            font-size: 1.5rem;
            font-weight: 800;
            margin: 0;
        }

        .modal-close-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--bg-secondary);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast);
        }

        .modal-close-btn:hover {
            background: var(--border-light);
        }

        .form-grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .modal-btn {
            flex: 1;
            padding: 14px;
            border-radius: var(--radius-full);
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            border: none;
            transition: all var(--transition-fast);
        }

        .modal-btn-cancel {
            background: var(--bg-secondary);
            color: var(--text-secondary);
        }

        .modal-btn-cancel:hover {
            background: var(--border-light);
        }

        .modal-btn-submit {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
        }

        .modal-btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(200, 152, 46, 0.3);
        }

        @media (max-width: 768px) {
            .admin-header-content {
                flex-direction: column;
                align-items: flex-start;
            }

            .form-grid-2,
            .form-grid-3 {
                grid-template-columns: 1fr;
            }

            .order-details-grid {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>

<body>
    <div id="pageHeader"></div>

    <main style="padding-top:var(--header-height)">
        <!-- Admin Header -->
        <div class="admin-header" style="margin-top:0">
            <div class="container">
                <div class="admin-header-content">
                    <div class="admin-title-section">
                        <h1>Admin Dashboard</h1>
                        <p>Manage your store, products and orders</p>
                    </div>
                    <div class="admin-actions">
                        <button onclick="showAddProductModal()" class="admin-btn admin-btn-primary">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M12 4v16m8-8H4" />
                            </svg>
                            Add Product
                        </button>
                        <button onclick="handleLogout()" class="admin-btn admin-btn-danger">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path
                                    d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                            </svg>
                            Logout
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="container">
            <!-- Tabs -->
            <div class="admin-tabs">
                <button onclick="showTab('orders')" id="ordersTab" class="admin-tab active">Orders</button>
                <button onclick="showTab('products')" id="productsTab" class="admin-tab">Products</button>
            </div>

            <!-- Orders Section -->
            <div id="ordersSection">
                <div class="stats-grid" id="statsGrid"></div>
                <div id="ordersList"></div>
            </div>

            <!-- Products Section -->
            <div id="productsSection" style="display:none">
                <div id="productsList"></div>
            </div>
        </div>
    </main>

    <div id="pageFooter"></div>

    <!-- Add Product Modal -->
    <div id="addProductModal" class="modal-overlay-modern">
        <div class="modal-content-modern">
            <div class="modal-header-modern">
                <h2>Add New Product</h2>
                <button onclick="closeAddProductModal()" class="modal-close-btn">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </div>

            <form onsubmit="handleAddProduct(event)">
                <div class="form-grid-2">
                    <div class="form-group">
                        <label class="form-label">Product Name *</label>
                        <input type="text" class="form-input" id="prodName" placeholder="e.g. Dawlance Generator 5KW"
                            required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Category *</label>
                        <select class="form-input form-select" id="prodCategory" required>
                            <option value="">Select Category</option>
                            <option value="air-conditioners">Air Conditioners</option>
                            <option value="refrigerators">Refrigerators</option>
                            <option value="washing-machines">Washing Machines</option>
                            <option value="televisions">Televisions</option>
                            <option value="mobiles">Mobile Phones</option>
                            <option value="fans">Fans</option>
                            <option value="kitchen-appliances">Kitchen Appliances</option>
                            <option value="laptops">Laptops</option>
                            <option value="audio">Audio & Speakers</option>
                            <option value="cameras">Cameras</option>
                            <option value="room-coolers">Room Coolers</option>
                            <option value="deep-freezers">Deep Freezers</option>
                            <option value="generators">Generators</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Brand *</label>
                    <input type="text" class="form-input" id="prodBrand" placeholder="e.g. Dawlance" required>
                </div>

                <div class="form-grid-2">
                    <div class="form-group">
                        <label class="form-label">Price (Rs.) *</label>
                        <input type="number" class="form-input" id="prodPrice" placeholder="150000" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Original Price (Rs.)</label>
                        <input type="number" class="form-input" id="prodOriginalPrice" placeholder="180000">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Image URL *</label>
                    <input type="url" class="form-input" id="prodImage" placeholder="https://example.com/image.jpg"
                        required>
                </div>

                <div class="form-group">
                    <label class="form-label">Description *</label>
                    <textarea class="form-input" id="prodDescription" rows="3" placeholder="Product description..."
                        required></textarea>
                </div>

                <div class="form-grid-3">
                    <div class="form-group">
                        <label class="form-label">Stock *</label>
                        <input type="number" class="form-input" id="prodStock" placeholder="10" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">SKU *</label>
                        <input type="text" class="form-input" id="prodSku" placeholder="GEN-DAW-5KW" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Badge</label>
                        <select class="form-input form-select" id="prodBadge">
                            <option value="">None</option>
                            <option value="New">New</option>
                            <option value="Sale">Sale</option>
                            <option value="Hot">Hot</option>
                            <option value="Best Seller">Best Seller</option>
                            <option value="Premium">Premium</option>
                        </select>
                    </div>
                </div>

                <div id="addProductError"
                    style="display:none;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:var(--radius-md);padding:12px;margin-bottom:16px;color:var(--danger);font-size:0.9rem">
                </div>
                <div id="addProductSuccess"
                    style="display:none;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);border-radius:var(--radius-md);padding:12px;margin-bottom:16px;color:var(--accent);font-size:0.9rem">
                </div>

                <div class="modal-actions">
                    <button type="button" onclick="closeAddProductModal()"
                        class="modal-btn modal-btn-cancel">Cancel</button>
                    <button type="submit" class="modal-btn modal-btn-submit">Add Product</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Action Modal -->
    <div id="actionModal" class="modal-overlay-modern">
        <div class="modal-content-modern" style="max-width:420px;text-align:center">
            <div id="actionIcon"
                style="width:72px;height:72px;margin:0 auto 20px;border-radius:50%;display:flex;align-items:center;justify-content:center">
            </div>
            <h3 id="actionTitle" style="font-size:1.4rem;font-weight:800;margin-bottom:12px"></h3>
            <p id="actionMessage" style="color:var(--text-secondary);font-size:0.95rem;margin-bottom:8px"></p>
            <p id="actionOrderId" style="color:var(--text-muted);font-size:0.85rem;margin-bottom:24px"></p>
            <div style="display:flex;gap:12px">
                <button onclick="closeActionModal()" class="modal-btn modal-btn-cancel">Go Back</button>
                <button id="actionConfirmBtn" class="modal-btn" style="background:var(--primary);color:#fff"></button>
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/header-sync.js"></script>
    <script src="js/app.js"></script>
    <script src="js/admin-config.js"></script>
    <script src="js/scroll-animations.js"></script>
    <script>
        if (localStorage.getItem('admin_logged_in') !== 'true') {
            window.location.href = 'admin-login.html';
        }
        initPage('home');

        let orders = [];
        let pendingAction = null;

        async function loadOrders() {
            const localOrders = JSON.parse(localStorage.getItem('sasta_orders') || '[]');
            orders = localOrders;
            renderStats();
            renderOrders();
        }

        function renderStats() {
            const statsGrid = document.getElementById('statsGrid');
            const pendingCount = orders.filter(o => o.status === 'pending').length;
            const confirmedCount = orders.filter(o => o.status === 'confirmed').length;
            const cancelledCount = orders.filter(o => o.status === 'cancelled').length;

            statsGrid.innerHTML = `
        <div class="stat-card-modern">
          <div class="stat-icon stat-icon-pending">
            <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          </div>
          <div class="stat-info"><h3 style="color:var(--warning)">${pendingCount}</h3><p>Pending</p></div>
        </div>
        <div class="stat-card-modern">
          <div class="stat-icon stat-icon-confirmed">
            <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <div class="stat-info"><h3 style="color:var(--accent)">${confirmedCount}</h3><p>Confirmed</p></div>
        </div>
        <div class="stat-card-modern">
          <div class="stat-icon stat-icon-cancelled">
            <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </div>
          <div class="stat-info"><h3 style="color:var(--danger)">${cancelledCount}</h3><p>Cancelled</p></div>
        </div>
        <div class="stat-card-modern">
          <div class="stat-icon stat-icon-total">
            <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
          </div>
          <div class="stat-info"><h3 style="color:var(--primary)">${orders.length}</h3><p>Total Orders</p></div>
        </div>
      `;
        }

        function renderOrders() {
            const ordersList = document.getElementById('ordersList');

            if (orders.length === 0) {
                ordersList.innerHTML = '<div class="empty-state-modern"><div class="empty-state-icon"><svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="currentColor" stroke-width="2"><line x1="16.5" y1="9.4" x2="7.5" y2="4.21"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg></div><h3>No Orders Yet</h3><p>Orders will appear here when customers place them.</p></div>';
                return;
            }

            let html = '';
            orders.forEach(order => {
                const date = new Date(order.created_at || order.date);
                const shipping = order.shipping || {};
                const customerName = ((shipping.firstName || '') + ' ' + (shipping.lastName || '')).trim();
                const statusClass = order.status === 'pending' ? 'pending' : order.status === 'confirmed' ? 'confirmed' : 'cancelled';

                html += '<div class="order-card-modern ' + statusClass + '">';
                html += '<div class="order-header-modern">';
                html += '<div class="order-id-section"><h3>Order #' + order.id + '</h3><div class="order-date">' + date.toLocaleDateString('en-PK', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' }) + '</div><div class="order-status-badge status-' + order.status + '">' + order.status.charAt(0).toUpperCase() + order.status.slice(1) + '</div></div>';
                html += '<div class="order-total-section"><div class="order-total">' + formatPrice(order.total) + '</div><div class="order-customer">' + customerName + '</div><div class="order-customer">' + (shipping.phone || '') + '</div></div>';
                html += '</div>';
                html += '<div class="order-details-grid"><div class="order-detail-item"><strong>Email:</strong> <span>' + (shipping.email || order.user_email || 'N/A') + '</span></div><div class="order-detail-item"><strong>Address:</strong> <span>' + (shipping.address || '') + ', ' + (shipping.city || '') + '</span></div></div>';
                html += '<div class="order-items-list">';
                if (order.items && order.items.length > 0) {
                    order.items.forEach(item => {
                        const product = getProductById(item.id);
                        if (product) {
                            html += '<div class="order-item-row"><div class="order-item-image"><img src="' + product.image + '"></div><div class="order-item-info"><div class="order-item-name">' + product.name + '</div><div class="order-item-qty">Qty: ' + item.qty + ' × ' + formatPrice(product.price) + '</div></div><div class="order-item-price">' + formatPrice(product.price * item.qty) + '</div></div>';
                        }
                    });
                }
                html += '</div>';
                if (order.status === 'pending') {
                    html += '<div class="order-actions"><button class="order-action-btn btn-confirm" onclick="openActionModal(\'' + order.id + '\', \'confirm\')"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Confirm Order</button><button class="order-action-btn btn-cancel-order" onclick="openActionModal(\'' + order.id + '\', \'cancel\')"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Cancel Order</button></div>';
                }
                html += '</div>';
            });
            ordersList.innerHTML = html;
        }

        function loadProducts() {
            const productsList = document.getElementById('productsList');
            const customProducts = JSON.parse(localStorage.getItem('custom_products') || '[]');

            if (customProducts.length === 0) {
                productsList.innerHTML = '<div class="empty-state-modern"><div class="empty-state-icon"><svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg></div><h3>No Custom Products</h3><p>Click "Add Product" to add your first product.</p></div>';
                return;
            }

            let html = '<div class="product-grid">';
            customProducts.forEach((product, index) => {
                html += '<div class="product-card-admin"><div class="product-card-admin-image"><img src="' + product.image + '"></div><div class="product-card-admin-body">';
                if (product.badge) html += '<span class="product-card-admin-badge">' + product.badge + '</span>';
                html += '<div class="product-card-admin-name">' + product.name + '</div>';
                html += '<div class="product-card-admin-meta">' + product.brand + ' | ' + getCategoryName(product.category) + '</div>';
                html += '<div class="product-card-admin-price">' + formatPrice(product.price) + '</div>';
                html += '<div class="product-card-admin-actions"><button class="product-delete-btn" onclick="deleteProduct(' + index + ')">Delete</button></div>';
                html += '</div></div>';
            });
            html += '</div>';
            productsList.innerHTML = html;
        }

        function showTab(tab) {
            const ordersSection = document.getElementById('ordersSection');
            const productsSection = document.getElementById('productsSection');
            const ordersTab = document.getElementById('ordersTab');
            const productsTab = document.getElementById('productsTab');

            if (tab === 'orders') {
                ordersSection.style.display = 'block';
                productsSection.style.display = 'none';
                ordersTab.classList.add('active');
                productsTab.classList.remove('active');
            } else {
                ordersSection.style.display = 'none';
                productsSection.style.display = 'block';
                productsTab.classList.add('active');
                ordersTab.classList.remove('active');
                loadProducts();
            }
        }

        function showAddProductModal() { document.getElementById('addProductModal').classList.add('open'); }
        function closeAddProductModal() { document.getElementById('addProductModal').classList.remove('open'); document.getElementById('addProductError').style.display = 'none'; document.getElementById('addProductSuccess').style.display = 'none'; }

        function handleAddProduct(e) {
            e.preventDefault();
            const product = {
                id: 'PROD-' + Date.now().toString(36).toUpperCase(),
                name: document.getElementById('prodName').value.trim(),
                category: document.getElementById('prodCategory').value,
                brand: document.getElementById('prodBrand').value.trim(),
                price: Number(document.getElementById('prodPrice').value),
                originalPrice: Number(document.getElementById('prodOriginalPrice').value) || null,
                image: document.getElementById('prodImage').value.trim(),
                description: document.getElementById('prodDescription').value.trim(),
                stock: Number(document.getElementById('prodStock').value),
                sku: document.getElementById('prodSku').value.trim(),
                badge: document.getElementById('prodBadge').value || null,
                rating: 4.5, reviews: 0, custom: true
            };
            const customProducts = JSON.parse(localStorage.getItem('custom_products') || '[]');
            customProducts.push(product);
            localStorage.setItem('custom_products', JSON.stringify(customProducts));
            if (typeof PRODUCTS_DATA !== 'undefined') PRODUCTS_DATA.push(product);
            document.getElementById('addProductSuccess').textContent = 'Product added successfully!';
            document.getElementById('addProductSuccess').style.display = 'block';
            setTimeout(() => { closeAddProductModal(); showTab('products'); showToast('Product added: ' + product.name, 'success'); }, 1500);
        }

        function deleteProduct(index) {
            const customProducts = JSON.parse(localStorage.getItem('custom_products') || '[]');
            const productName = customProducts[index].name;
            customProducts.splice(index, 1);
            localStorage.setItem('custom_products', JSON.stringify(customProducts));
            loadProducts();
            showToast('Product deleted: ' + productName, 'info');
        }

        function openActionModal(orderId, action) {
            pendingAction = { orderId, action };
            const modal = document.getElementById('actionModal');
            const icon = document.getElementById('actionIcon');
            const title = document.getElementById('actionTitle');
            const message = document.getElementById('actionMessage');
            const orderIdEl = document.getElementById('actionOrderId');
            const confirmBtn = document.getElementById('actionConfirmBtn');

            if (action === 'confirm') {
                icon.style.background = 'rgba(15,157,88,0.1)';
                icon.innerHTML = '<svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="var(--accent)" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>';
                title.textContent = 'Confirm Order?';
                message.textContent = 'Customer will be notified.';
                confirmBtn.textContent = 'Yes, Confirm';
                confirmBtn.style.background = 'var(--accent)';
            } else {
                icon.style.background = 'rgba(239,68,68,0.1)';
                icon.innerHTML = '<svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="var(--danger)" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
                title.textContent = 'Cancel Order?';
                message.textContent = 'Customer will be notified.';
                confirmBtn.textContent = 'Yes, Cancel';
                confirmBtn.style.background = 'var(--danger)';
            }
            orderIdEl.textContent = 'Order #' + orderId;
            modal.classList.add('open');
        }

        function closeActionModal() { pendingAction = null; document.getElementById('actionModal').classList.remove('open'); }

        async function confirmAction() {
            if (!pendingAction) return;
            const { orderId, action } = pendingAction;
            const newStatus = action === 'confirm' ? 'confirmed' : 'cancelled';
            const localOrders = JSON.parse(localStorage.getItem('sasta_orders') || '[]');
            const localOrder = localOrders.find(o => o.id === orderId);
            if (localOrder) { localOrder.status = newStatus; localOrder.updated_at = new Date().toISOString(); localStorage.setItem('sasta_orders', JSON.stringify(localOrders)); }
            showToast('Order ' + newStatus + '!', 'success');
            closeActionModal();
            await loadOrders();
        }

        document.getElementById('actionConfirmBtn').onclick = confirmAction;
        document.querySelectorAll('.modal-overlay-modern').forEach(modal => {
            modal.addEventListener('click', function (e) { if (e.target === this) { this.classList.remove('open'); pendingAction = null; } });
        });
        document.addEventListener('keydown', function (e) { if (e.key === 'Escape') { document.querySelectorAll('.modal-overlay-modern').forEach(m => m.classList.remove('open')); pendingAction = null; } });

        function handleLogout() { localStorage.removeItem('admin_logged_in'); localStorage.removeItem('admin_session_start'); showToast('Logged out', 'info'); setTimeout(() => { window.location.href = 'admin-login.html'; }, 800); }

        loadOrders();
    </script>
