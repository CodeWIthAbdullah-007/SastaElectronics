<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 70">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8C547"/>
      <stop offset="50%" style="stop-color:#D4A017"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>
  </defs>
  
  <!-- Shield Icon -->
  <g transform="translate(0, 5)">
    <!-- Shield outline -->
    <path d="M30 8 L50 16 L50 32 C50 42 40 50 30 54 C20 50 10 42 10 32 L10 16 Z" 
          fill="none" stroke="url(#goldGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Inner shield accent -->
    <path d="M30 14 L44 20 L44 31 C44 39 37 45 30 48 C23 45 16 39 16 31 L16 20 Z" 
          fill="none" stroke="url(#goldGrad)" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
    
    <!-- Lightning bolt -->
    <path d="M32 14 L22 30 L30 30 L26 46 L38 26 L30 26 Z" 
          fill="url(#goldGrad)" stroke="url(#goldGrad)" stroke-width="0.5" stroke-linejoin="round"/>
    
    <!-- Circuit dot -->
    <circle cx="40" cy="22" r="2.5" fill="url(#goldGrad)"/>
    <line x1="38" y1="22" x2="35" y2="24" stroke="url(#goldGrad)" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  
  <!-- Text: SastaElectronics -->
  <text x="62" y="36" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="22" fill="#1A1A2E" letter-spacing="-0.5">
    Sasta<tspan font-weight="700" fill="#1A1A2E">Electronics</tspan>
  </text>
  
  <!-- Tagline -->
  <text x="62" y="54" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="9" fill="#D4A017" letter-spacing="3">
    PREMIUM TECH, SASTA PRICE
  </text>
</svg>