<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist - SastaElectronics</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="shortcut icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="pageHeader"></div>
    <main style="padding-top:var(--header-height)">
        <div class="page-header">
            <h1 class="scroll-animate">My Wishlist</h1>
            <p class="scroll-animate delay-1">Products you've saved for later</p>
        </div>
        <div class="container section" style="padding-top:0">
            <div id="wishlistContent"></div>
        </div>
    </main>
    <div id="pageFooter"></div>
    <script src="js/data.js"></script>
    <script src="js/header-sync.js"></script>
    <script src="js/app.js"></script>
    <script src="js/scroll-animations.js"></script>
    <script>
        initPage('home');
        function renderWishlist() {
            const items = Wishlist.get();
            const content = document.getElementById('wishlistContent');
            if (items.length === 0) {
                content.innerHTML = '<div class="empty-state"><div class="empty-state-icon"><svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></div><h3>Your wishlist is empty</h3><p>Save products you love for later</p><a href="shop.html" class="btn btn-primary">Browse Products</a></div>';
                return;
            }
            content.innerHTML = '<div class="grid grid-4 stagger-children">' + items.map(id => getProductById(id)).filter(Boolean).map(renderProductCard).join('') + '</div>';
        }
        renderWishlist();
    </script>
</body>

</html>
