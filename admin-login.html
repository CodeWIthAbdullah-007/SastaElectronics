<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - SastaElectronics</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="shortcut icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="pageHeader"></div>
    <main style="padding-top:var(--header-height)">
        <div class="container"
            style="display:flex;align-items:center;justify-content:center;min-height:calc(100vh - var(--header-height) - 100px)">
            <div class="glass-card scroll-animate" style="max-width:420px;width:100%;padding:40px">
                <div style="text-align:center;margin-bottom:32px">
                    <div
                        style="width:72px;height:72px;margin:0 auto 16px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));border-radius:50%;display:flex;align-items:center;justify-content:center">
                        <svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="#fff" stroke-width="2">
                            <path
                                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                        </svg>
                    </div>
                    <h1 style="font-size:1.8rem;font-weight:800;margin-bottom:8px">Admin Login</h1>
                    <p style="color:var(--text-secondary)">Sign in to manage orders</p>
                </div>

                <form onsubmit="handleAdminLogin(event)">
                    <div class="form-group scroll-animate delay-1">
                        <label class="form-label">Username *</label>
                        <input type="text" class="form-input" id="adminUsername" placeholder="Enter username" required>
                    </div>
                    <div class="form-group scroll-animate delay-2">
                        <label class="form-label">Password *</label>
                        <input type="password" class="form-input" id="adminPassword" placeholder="Enter password"
                            required>
                    </div>

                    <div id="loginError"
                        style="display:none;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:var(--radius-md);padding:12px;margin-bottom:16px;color:var(--danger);font-size:0.9rem">
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg w-full scroll-animate delay-3"
                        id="loginBtn">Sign In</button>
                </form>

                <div
                    style="margin-top:24px;padding-top:20px;border-top:1px solid var(--border-light);text-align:center">
                    <p style="color:var(--text-muted);font-size:0.85rem">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"
                            stroke-width="2" style="vertical-align:middle;margin-right:4px">
                            <path
                                d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                        </svg>
                        Default: admin / admin123
                    </p>
                </div>
            </div>
        </div>
    </main>
    <div id="pageFooter"></div>
    <script src="js/data.js"></script>
    <script src="js/header-sync.js"></script>
    <script src="js/app.js"></script>
    <script src="js/admin-config.js"></script>
    <script src="js/scroll-animations.js"></script>
    <script>
        initPage('home');

        // Check if already logged in
        if (localStorage.getItem('admin_logged_in') === 'true') {
            window.location.href = 'admin.html';
        }

        function handleAdminLogin(e) {
            e.preventDefault();
            const username = document.getElementById('adminUsername').value.trim();
            const password = document.getElementById('adminPassword').value;
            const errorDiv = document.getElementById('loginError');
            const btn = document.getElementById('loginBtn');

            errorDiv.style.display = 'none';

            if (username === ADMIN_CREDENTIALS.username && password === ADMIN_CREDENTIALS.password) {
                localStorage.setItem('admin_logged_in', 'true');
                localStorage.setItem('admin_session_start', new Date().toISOString());
                showToast('Login successful!', 'success');
                setTimeout(() => {
                    window.location.href = 'admin.html';
                }, 800);
            } else {
                errorDiv.textContent = 'Invalid username or password';
                errorDiv.style.display = 'block';
            }
        }
    </script>
</body>

</html>
