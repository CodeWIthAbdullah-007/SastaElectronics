<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - SastaElectronics</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="shortcut icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <div id="pageHeader"></div>
    <main style="padding-top:var(--header-height)">
        <div class="page-header">
            <h1 class="scroll-animate">My Dashboard</h1>
            <p class="scroll-animate delay-1">Manage your account and orders</p>
        </div>
        <div class="container section" style="padding-top:0">
            <div id="authCheck" style="text-align:center;padding:80px 20px">
                <div class="loading-spinner"></div>
                <p style="color:var(--text-secondary);margin-top:16px">Checking...</p>
            </div>
            <div id="dashboardContent" style="display:none">
                <div class="dashboard-grid">
                    <aside class="dashboard-sidebar scroll-animate">
                        <div id="userProfileCard"
                            style="text-align:center;padding:20px 16px;background:var(--bg-secondary);border-radius:var(--radius-lg);margin-bottom:16px">
                            <div id="userAvatarLarge"
                                style="width:80px;height:80px;border-radius:50%;margin:0 auto 12px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.8rem;font-weight:800;overflow:hidden;border:3px solid #fff;box-shadow:var(--shadow-md)">
                                U</div>
                            <h3 id="userDisplayName"
                                style="font-weight:700;font-size:1.05rem;margin-bottom:2px;color:var(--text-primary)">
                                User</h3>
                            <p id="userDisplayEmail"
                                style="color:var(--text-muted);font-size:0.82rem;margin:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
                                <a href="/cdn-cgi/l/email-protection" class="__cf_email__"
                                    data-cfemail="512422342311343c30383d7f323e3c">[email&#160;protected]</a></p>
                            <a href="profile.html"
                                style="display:inline-block;margin-top:10px;font-size:0.82rem;color:var(--primary-dark);font-weight:600;text-decoration:none">Edit
                                Profile →</a>
                        </div>
                        <nav class="dashboard-sidebar-nav">
                            <a href="dashboard.html" class="active"><svg viewBox="0 0 24 24" width="20" height="20"
                                    fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="3" width="7" height="7" />
                                    <rect x="14" y="3" width="7" height="7" />
                                    <rect x="14" y="14" width="7" height="7" />
                                    <rect x="3" y="14" width="7" height="7" />
                                </svg>Dashboard</a>
                            <a href="profile.html"><svg viewBox="0 0 24 24" width="20" height="20" fill="none"
                                    stroke="currentColor" stroke-width="2">
                                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                                    <circle cx="12" cy="7" r="4" />
                                </svg>My Profile</a>
                            <a href="orders.html"><svg viewBox="0 0 24 24" width="20" height="20" fill="none"
                                    stroke="currentColor" stroke-width="2">
                                    <line x1="16.5" y1="9.4" x2="7.5" y2="4.21" />
                                    <path
                                        d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
                                </svg>My Orders</a>
                            <a href="wishlist.html"><svg viewBox="0 0 24 24" width="20" height="20" fill="none"
                                    stroke="currentColor" stroke-width="2">
                                    <path
                                        d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
                                </svg>Wishlist</a>
                            <a href="cart.html"><svg viewBox="0 0 24 24" width="20" height="20" fill="none"
                                    stroke="currentColor" stroke-width="2">
                                    <circle cx="9" cy="21" r="1" />
                                    <circle cx="20" cy="21" r="1" />
                                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
                                </svg>Cart</a>
                        </nav>
                        <div style="margin-top:20px;padding-top:20px;border-top:1px solid var(--border-glass)">
                            <button class="btn btn-danger w-full" id="logoutBtn" onclick="handleLogout()"><svg
                                    viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                                    <polyline points="16 17 21 12 16 7" />
                                    <line x1="21" y1="12" x2="9" y2="12" />
                                </svg>Sign Out</button>
                        </div>
                    </aside>
                    <div>
                        <div class="stat-cards stagger-children" id="dashStats"></div>
                        <div class="glass-card scroll-animate">
                            <h3 style="margin-bottom:20px;font-weight:700">Recent Orders</h3>
                            <div id="recentOrders"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <div id="pageFooter"></div>
    <script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/data.js"></script>
    <script src="js/header-sync.js"></script>
    <script src="js/app.js"></script>
    <script src="js/scroll-animations.js"></script>
    <script>
        initPage('home');
        (async function () {
            let user = null;
            if (typeof supabaseClient !== 'undefined' && supabaseClient) {
                try { const { data } = await supabaseClient.auth.getSession(); if (data && data.session && data.session.user) user = data.session.user; } catch (e) { }
            }
            if (!user) { const localUser = localStorage.getItem('sasta_current_user'); if (localUser) { try { user = JSON.parse(localUser); } catch (e) { } } }
            if (!user) { window.location.href = 'login.html'; return; }
            showDashboard(user);
        })();
        function showDashboard(user) {
            document.getElementById('authCheck').style.display = 'none';
            document.getElementById('dashboardContent').style.display = 'block';
            const userId = user.id || user.email;
            const firstName = user.user_metadata?.first_name || user.firstName || '';
            const lastName = user.user_metadata?.last_name || user.lastName || '';
            const email = user.email || '';
            const fullName = (firstName + ' ' + lastName).trim() || email.split('@')[0] || 'User';
            const initial = fullName.charAt(0).toUpperCase();
            const savedAvatar = localStorage.getItem('user_avatar_' + userId);
            const avatarEl = document.getElementById('userAvatarLarge');
            if (savedAvatar) { avatarEl.innerHTML = '<img src="' + savedAvatar + '" style="width:100%;height:100%;object-fit:cover">'; } else { avatarEl.textContent = initial; }
            document.getElementById('userDisplayName').textContent = fullName;
            document.getElementById('userDisplayEmail').textContent = email;
            const orders = JSON.parse(localStorage.getItem('sasta_orders') || '[]');
            document.getElementById('dashStats').innerHTML = '<div class="stat-card"><div class="stat-card-value" style="color:var(--primary-dark)">' + orders.length + '</div><div class="stat-card-label">Total Orders</div></div><div class="stat-card"><div class="stat-card-value" style="color:var(--accent)">' + formatPrice(orders.reduce((s, o) => s + o.total, 0)) + '</div><div class="stat-card-label">Total Spent</div></div><div class="stat-card"><div class="stat-card-value" style="color:var(--warning)">' + orders.filter(o => o.status === 'pending').length + '</div><div class="stat-card-label">Pending</div></div><div class="stat-card"><div class="stat-card-value" style="color:var(--secondary)">' + Wishlist.count() + '</div><div class="stat-card-label">Wishlist</div></div>';
            const recent = orders.slice(-5).reverse();
            document.getElementById('recentOrders').innerHTML = recent.length === 0 ? '<div style="text-align:center;padding:30px"><p style="color:var(--text-secondary);margin-bottom:12px">No orders yet</p><a href="shop.html" class="btn btn-primary">Start Shopping</a></div>' : recent.map(o => '<div style="display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--border-glass)"><div><div style="font-weight:700">' + o.id + '</div><div style="font-size:0.85rem;color:var(--text-muted)">' + new Date(o.date).toLocaleDateString() + '</div></div><div style="text-align:right"><span class="order-status ' + o.status + '">' + o.status + '</span><div style="font-weight:700;margin-top:4px;color:var(--primary-dark)">' + formatPrice(o.total) + '</div></div></div>').join('');
        }
        async function handleLogout() {
            sessionStorage.setItem('justLoggedOut', 'true');
            localStorage.removeItem('sasta_current_user');
            // Clear header user data
            localStorage.removeItem('header_avatar');
            localStorage.removeItem('header_userName');
            localStorage.removeItem('header_hasAvatar');
            if (typeof supabaseClient !== 'undefined' && supabaseClient) { try { await supabaseClient.auth.signOut(); } catch (e) { } }
            showToast('Logged out', 'info');
            setTimeout(() => { window.location.href = 'login.html'; }, 500);
        }
    </script>

</body>

</html>
