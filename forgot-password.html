<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - SastaElectronics</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="shortcut icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="pageHeader"></div>
    <main style="padding-top:var(--header-height)">
        <div class="container"
            style="display:flex;align-items:center;justify-content:center;min-height:calc(100vh - var(--header-height) - 100px)">
            <div class="glass-card scroll-animate" style="max-width:440px;width:100%;padding:40px">
                <div style="text-align:center;margin-bottom:32px">
                    <div
                        style="width:64px;height:64px;margin:0 auto 16px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));border-radius:50%;display:flex;align-items:center;justify-content:center;animation:float 3s ease-in-out infinite">
                        <svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="#fff" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                        </svg>
                    </div>
                    <h1 class="scroll-animate delay-1" style="font-size:1.8rem;font-weight:800;margin-bottom:8px">Forgot
                        Password?</h1>
                    <p class="scroll-animate delay-2" style="color:var(--text-secondary)">No worries, we'll send you
                        reset instructions</p>
                </div>
                <div id="forgotForm" class="scroll-animate delay-3">
                    <form onsubmit="handleForgotPassword(event)">
                        <div class="form-group">
                            <label class="form-label">Email Address *</label>
                            <input type="email" class="form-input" id="forgotEmail" placeholder="your@email.com"
                                required>
                            <small style="color:var(--text-muted);font-size:0.8rem;margin-top:4px;display:block">Enter
                                the email address associated with your account</small>
                        </div>
                        <div id="forgotError"
                            style="display:none;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:var(--radius-md);padding:12px;margin-bottom:16px;color:var(--danger);font-size:0.9rem;font-weight:500">
                        </div>
                        <div id="forgotSuccess"
                            style="display:none;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);border-radius:var(--radius-md);padding:12px;margin-bottom:16px;color:var(--accent);font-size:0.9rem;font-weight:500">
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg w-full" id="forgotBtn">Send Reset
                            Link</button>
                    </form>
                </div>
                <div id="forgotMessage" style="display:none;text-align:center;padding:20px">
                    <div
                        style="width:64px;height:64px;margin:0 auto 16px;background:rgba(16,185,129,0.1);border-radius:50%;display:flex;align-items:center;justify-content:center;animation:bounceIn 0.6s ease-out">
                        <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="var(--accent)"
                            stroke-width="2.5">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                            <polyline points="22,6 12,13 2,6" />
                        </svg>
                    </div>
                    <h3 style="margin-bottom:8px;color:var(--text-primary)">Check Your Email!</h3>
                    <p style="color:var(--text-secondary);margin-bottom:8px">We've sent password reset instructions
                        to:<br><strong id="sentEmail" style="color:var(--primary-dark)"></strong></p>
                    <p style="color:var(--text-muted);font-size:0.85rem;margin-bottom:20px">The link will expire in 1
                        hour. Check your spam folder if you don't see it.</p>
                    <a href="login.html" class="btn btn-secondary">Back to Login</a>
                </div>
                <div style="margin-top:24px;text-align:center" class="scroll-animate delay-4">
                    <a href="login.html"
                        style="font-size:0.9rem;color:var(--text-secondary);text-decoration:none;display:inline-flex;align-items:center;gap:6px">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <line x1="19" y1="12" x2="5" y2="12" />
                            <polyline points="12 19 5 12 12 5" />
                        </svg>
                        Back to Login
                    </a>
                </div>
            </div>
        </div>
    </main>
    <div id="pageFooter"></div>
    <script src="js/supabase-config.js"></script>
    <script src="js/data.js"></script>
    <script src="js/header-sync.js"></script>
    <script src="js/app.js"></script>
    <script src="js/scroll-animations.js"></script>
    <script>
        initPage('home');
        async function handleForgotPassword(e) {
            e.preventDefault();
            const email = document.getElementById('forgotEmail').value.trim();
            const errorDiv = document.getElementById('forgotError');
            const successDiv = document.getElementById('forgotSuccess');
            const btn = document.getElementById('forgotBtn');
            errorDiv.style.display = 'none'; successDiv.style.display = 'none';
            if (!email) { errorDiv.textContent = 'Please enter your email address'; errorDiv.style.display = 'block'; return; }
            btn.disabled = true; btn.textContent = 'Sending...';
            try {
                if (typeof supabaseClient !== 'undefined' && supabaseClient) {
                    const { error } = await supabaseClient.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin + '/reset-password.html' });
                    if (error) { errorDiv.textContent = error.message; errorDiv.style.display = 'block'; btn.disabled = false; btn.textContent = 'Send Reset Link'; return; }
                }
                document.getElementById('forgotForm').style.display = 'none';
                document.getElementById('forgotMessage').style.display = 'block';
                document.getElementById('sentEmail').textContent = email;
                showToast('Reset email sent!', 'success');
            } catch (err) { errorDiv.textContent = err.message || 'Failed to send reset email'; errorDiv.style.display = 'block'; btn.disabled = false; btn.textContent = 'Send Reset Link'; }
        }
    </script>
    <script>(function () { function c() { var b = a.contentDocument || a.contentWindow.document; if (b) { var d = b.createElement('script'); d.innerHTML = "window.__CF$cv$params={r:'a1e47f3c8efd0ffc',t:'MTc4NDU3NzA0OQ=='};var a=document.createElement('script');a.src='/cdn-cgi/challenge-platform/scripts/jsd/main.js';document.getElementsByTagName('head')[0].appendChild(a);"; b.getElementsByTagName('head')[0].appendChild(d) } } if (document.body) { var a = document.createElement('iframe'); a.height = 1; a.width = 1; a.style.position = 'absolute'; a.style.top = 0; a.style.left = 0; a.style.border = 'none'; a.style.visibility = 'hidden'; document.body.appendChild(a); if ('loading' !== document.readyState) c(); else if (window.addEventListener) document.addEventListener('DOMContentLoaded', c); else { var e = document.onreadystatechange || function () { }; document.onreadystatechange = function (b) { e(b); 'loading' !== document.readyState && (document.onreadystatechange = e, c()) } } } })();</script>
</body>

</html>
