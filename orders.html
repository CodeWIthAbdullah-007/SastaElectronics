<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - SastaElectronics</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="shortcut icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        .delete-btn {
            background: rgba(107, 114, 128, 0.1);
            color: var(--text-secondary);
            border: 1.5px solid rgba(107, 114, 128, 0.3);
            padding: 8px 16px;
            border-radius: var(--radius-full);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .delete-btn:hover {
            background: var(--danger);
            color: #fff;
            border-color: var(--danger);
            transform: scale(1.05);
        }

        .cancel-btn {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1.5px solid rgba(239, 68, 68, 0.3);
            padding: 8px 16px;
            border-radius: var(--radius-full);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .cancel-btn:hover {
            background: var(--danger);
            color: #fff;
            border-color: var(--danger);
            transform: scale(1.05);
        }

        .cancel-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .cancel-btn:disabled:hover {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        .order-cancelled {
            opacity: 0.6;
            position: relative;
        }

        .order-cancelled::after {
            content: 'CANCELLED';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            background: rgba(239, 68, 68, 0.9);
            color: #fff;
            padding: 8px 24px;
            border-radius: var(--radius-full);
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: 2px;
            pointer-events: none;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            padding: 32px;
            max-width: 420px;
            width: 100%;
            box-shadow: var(--shadow-xl);
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(20px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
    </style>
</head>

<body>
    <div id="pageHeader"></div>
    <main style="padding-top:var(--header-height)">
        <div class="page-header">
            <h1 class="scroll-animate">My Orders</h1>
            <p class="scroll-animate delay-1">Track and manage your orders</p>
        </div>
        <div class="container section" style="padding-top:0" id="ordersContainer"></div>
    </main>
    <div id="pageFooter"></div>

    <!-- Delete Confirmation Modal -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal-content">
            <div style="text-align:center;margin-bottom:24px">
                <div
                    style="width:64px;height:64px;margin:0 auto 16px;background:rgba(239,68,68,0.1);border-radius:50%;display:flex;align-items:center;justify-content:center">
                    <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="var(--danger)" stroke-width="2">
                        <polyline points="3 6 5 6 21 6" />
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                        <line x1="10" y1="11" x2="10" y2="17" />
                        <line x1="14" y1="11" x2="14" y2="17" />
                    </svg>
                </div>
                <h3 style="font-size:1.4rem;font-weight:800;margin-bottom:8px">Delete Order?</h3>
                <p style="color:var(--text-secondary);font-size:0.95rem">This will permanently remove this order from
                    your history. This action cannot be undone.</p>
                <p style="color:var(--text-muted);font-size:0.85rem;margin-top:8px" id="deleteOrderId"></p>
            </div>
            <div style="display:flex;gap:12px">
                <button class="btn btn-secondary" style="flex:1" onclick="closeDeleteModal()">Keep Order</button>
                <button class="btn btn-danger" style="flex:1" id="confirmDeleteBtn" onclick="confirmDelete()">Yes,
                    Delete</button>
            </div>
        </div>
    </div>

    <!-- Cancel Confirmation Modal -->
    <div class="modal-overlay" id="cancelModal">
        <div class="modal-content">
            <div style="text-align:center;margin-bottom:24px">
                <div
                    style="width:64px;height:64px;margin:0 auto 16px;background:rgba(239,68,68,0.1);border-radius:50%;display:flex;align-items:center;justify-content:center">
                    <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="var(--danger)" stroke-width="2">
                        <circle cx="12" cy="12" r="10" />
                        <line x1="15" y1="9" x2="9" y2="15" />
                        <line x1="9" y1="9" x2="15" y2="15" />
                    </svg>
                </div>
                <h3 style="font-size:1.4rem;font-weight:800;margin-bottom:8px">Cancel Order?</h3>
                <p style="color:var(--text-secondary);font-size:0.95rem">Are you sure you want to cancel this order?
                    This action cannot be undone.</p>
                <p style="color:var(--text-muted);font-size:0.85rem;margin-top:8px" id="cancelOrderId"></p>
            </div>
            <div style="display:flex;gap:12px">
                <button class="btn btn-secondary" style="flex:1" onclick="closeCancelModal()">Keep Order</button>
                <button class="btn btn-danger" style="flex:1" id="confirmCancelBtn" onclick="confirmCancel()">Yes,
                    Cancel</button>
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/header-sync.js"></script>
    <script src="js/app.js"></script>
    <script src="js/scroll-animations.js"></script>
    <script>
        initPage('home');
        const confirmed = getUrlParam('confirmed');
        const container = document.getElementById('ordersContainer');
        let orders = JSON.parse(localStorage.getItem('sasta_orders') || '[]').reverse();
        let pendingCancelId = null;
        let pendingDeleteId = null;

        function saveOrders() {
            localStorage.setItem('sasta_orders', JSON.stringify(orders));
        }

        function canCancel(status) {
            return status === 'pending' || status === 'processing';
        }

        function openDeleteModal(orderId) {
            pendingDeleteId = orderId;
            document.getElementById('deleteOrderId').textContent = 'Order #' + orderId;
            document.getElementById('deleteModal').classList.add('open');
        }

        function closeDeleteModal() {
            pendingDeleteId = null;
            document.getElementById('deleteModal').classList.remove('open');
        }

        function confirmDelete() {
            if (!pendingDeleteId) return;
            orders = orders.filter(o => o.id !== pendingDeleteId);
            saveOrders();
            showToast('Order #' + pendingDeleteId + ' deleted', 'success');
            closeDeleteModal();
            renderOrders();
        }

        function openCancelModal(orderId) {
            pendingCancelId = orderId;
            document.getElementById('cancelOrderId').textContent = 'Order #' + orderId;
            document.getElementById('cancelModal').classList.add('open');
        }

        function closeCancelModal() {
            pendingCancelId = null;
            document.getElementById('cancelModal').classList.remove('open');
        }

        function confirmCancel() {
            if (!pendingCancelId) return;
            const order = orders.find(o => o.id === pendingCancelId);
            if (order && canCancel(order.status)) {
                order.status = 'cancelled';
                order.cancelledAt = new Date().toISOString();
                saveOrders();
                showToast('Order #' + pendingCancelId + ' cancelled', 'info');
                closeCancelModal();
                renderOrders();
            }
        }

        function renderOrders() {
            if (orders.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon"><svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="currentColor" stroke-width="2"><line x1="16.5" y1="9.4" x2="7.5" y2="4.21"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg></div><h3>No orders yet</h3><p>Start shopping!</p><a href="shop.html" class="btn btn-primary">Start Shopping</a></div>';
                return;
            }

            let html = '';
            if (confirmed) {
                html += '<div class="glass-card scroll-animate mb-4" style="border-color:rgba(15,157,88,0.3);text-align:center;padding:36px"><div style="width:64px;height:64px;margin:0 auto 16px;background:rgba(15,157,88,0.1);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--accent)"><svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></div><h2 style="margin-bottom:8px;font-weight:800">Order Confirmed!</h2><p style="color:var(--text-secondary)">Your order <strong style="color:var(--primary-dark)">' + confirmed + '</strong> has been placed successfully.</p></div>';
            }

            html += '<div class="stagger-children">';
            orders.forEach(order => {
                const date = new Date(order.date);
                const itemsList = order.items.map(item => {
                    const p = getProductById(item.id);
                    if (!p) return '';
                    return '<div style="display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border-glass)"><img src="' + p.image + '" style="width:52px;height:52px;border-radius:8px;object-fit:cover"><div style="flex:1"><div style="font-size:0.92rem;font-weight:600">' + p.name + '</div><div style="font-size:0.8rem;color:var(--text-muted)">Qty: ' + item.qty + '</div></div><div style="font-weight:700;font-size:0.92rem;color:var(--primary-dark)">' + formatPrice(p.price * item.qty) + '</div></div>';
                }).join('');

                const isCancelled = order.status === 'cancelled';
                const canCancelOrder = canCancel(order.status);

                html += '<div class="order-card' + (isCancelled ? ' order-cancelled' : '') + '">';
                html += '<div class="order-card-header">';
                html += '<div><div style="font-weight:700;margin-bottom:4px">Order #' + order.id + '</div><div style="color:var(--text-muted);font-size:0.85rem">' + date.toLocaleDateString('en-PK', { year: 'numeric', month: 'long', day: 'numeric' }) + '</div>';
                if (isCancelled && order.cancelledAt) {
                    html += '<div style="color:var(--danger);font-size:0.8rem;margin-top:4px">Cancelled: ' + new Date(order.cancelledAt).toLocaleDateString('en-PK', { year: 'numeric', month: 'long', day: 'numeric' }) + '</div>';
                }
                html += '</div>';
                html += '<div style="text-align:right"><span class="order-status ' + order.status + '">' + order.status.charAt(0).toUpperCase() + order.status.slice(1) + '</span><div style="font-weight:700;margin-top:8px;color:var(--primary-dark)">' + formatPrice(order.total) + '</div></div>';
                html += '</div>';
                html += itemsList;
                html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:16px;padding-top:12px;flex-wrap:wrap;gap:8px">';
                html += '<div style="font-size:0.85rem;color:var(--text-secondary)">Payment: ' + (order.payment === 'cod' ? 'Cash on Delivery' : order.payment === 'bank' ? 'Bank Transfer' : 'Card') + '</div>';
                html += '<div style="font-size:0.85rem;color:var(--text-secondary)">Ship to: ' + order.shipping.address + ', ' + order.shipping.city + '</div>';
                html += '</div>';

                if (canCancelOrder || isCancelled) {
                    html += '<div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--border-glass);text-align:right;display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap">';
                    if (canCancelOrder) {
                        html += '<button class="cancel-btn" onclick="openCancelModal(\'' + order.id + '\')">';
                        html += '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
                        html += 'Cancel Order';
                        html += '</button>';
                    }
                    html += '<button class="delete-btn" onclick="openDeleteModal(\'' + order.id + '\')">';
                    html += '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>';
                    html += 'Delete';
                    html += '</button>';
                    html += '</div>';
                }

                html += '</div>';
            });
            html += '</div>';
            container.innerHTML = html;
        }

        // Close modals on outside click
        document.querySelectorAll('.modal-overlay').forEach(modal => {
            modal.addEventListener('click', function (e) {
                if (e.target === this) {
                    this.classList.remove('open');
                    pendingCancelId = null;
                    pendingDeleteId = null;
                }
            });
        });

        // Close modals on Escape key
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') {
                document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('open'));
                pendingCancelId = null;
                pendingDeleteId = null;
            }
        });

        renderOrders();
    </script>
</body>

</html>
