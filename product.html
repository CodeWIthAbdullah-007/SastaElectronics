<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details - SastaElectronics</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="shortcut icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">
</head>

<body>
  <div id="pageHeader"></div>
  <main style="padding-top:var(--header-height)">
    <div class="container section" id="productContainer">
      <div class="loading-spinner"></div>
    </div>
    <section class="section" style="background:var(--bg-secondary)">
      <div class="container">
        <h2 class="section-title scroll-animate">Related Products</h2>
        <p class="section-subtitle scroll-animate delay-1">You might also like these</p>
        <div class="grid grid-4 stagger-children" id="relatedGrid"></div>
      </div>
    </section>
  </main>
  <div id="pageFooter"></div>
  <script src="js/data.js"></script>
  <script src="js/header-sync.js"></script>
  <script src="js/app.js"></script>
  <script src="js/scroll-animations.js"></script>
  <script>
    initPage('shop');
    const productId = getUrlParam('id');
    const product = getProductById(productId);
    const container = document.getElementById('productContainer');
    if (!product) {
      container.innerHTML = '<div class="empty-state"><div class="empty-state-icon"><svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg></div><h3>Product Not Found</h3><p>The product you\'re looking for doesn\'t exist.</p><a href="shop.html" class="btn btn-primary">Back to Shop</a></div>';
    } else {
      document.title = product.name + ' - SastaElectronics';
      const discount = product.originalPrice ? getDiscount(product.originalPrice, product.price) : 0;
      const isWishlisted = Wishlist.has(product.id);
      const specsHtml = Object.entries(product.specs || {}).map(([k, v]) => '<tr><td style="padding:12px 16px;color:var(--text-secondary);border-bottom:1px solid var(--border-glass);font-weight:600;background:var(--bg-secondary)">' + k + '</td><td style="padding:12px 16px;border-bottom:1px solid var(--border-glass)">' + v + '</td></tr>').join('');
      container.innerHTML = '<div class="breadcrumb scroll-animate"><a href="index.html">Home</a><span class="breadcrumb-sep">/</span><a href="shop.html">Shop</a><span class="breadcrumb-sep">/</span><a href="shop.html?category=' + product.category + '">' + getCategoryName(product.category) + '</a><span class="breadcrumb-sep">/</span><span>' + product.name + '</span></div><div id="productDetail" style="display:grid;grid-template-columns:1fr 1fr;gap:48px;margin-top:24px"><div class="scroll-animate"><div style="border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--border-light);background:#fff;box-shadow:var(--shadow-md)"><div style="height:450px;display:flex;align-items:center;justify-content:center;background:var(--bg-secondary)"><img src="' + product.image + '" alt="' + product.name + '" style="width:100%;height:100%;object-fit:cover"></div></div></div><div class="scroll-animate delay-2"><div style="display:flex;gap:8px;margin-bottom:12px">' + (product.badge ? '<span class="badge badge-primary">' + product.badge + '</span>' : '') + (discount > 0 ? '<span class="badge badge-accent">Save ' + discount + '%</span>' : '') + '</div><h1 style="font-size:1.9rem;font-weight:800;margin-bottom:10px;line-height:1.3">' + product.name + '</h1><div style="display:flex;align-items:center;gap:12px;margin-bottom:16px"><div style="display:flex;align-items:center;gap:4px">' + renderStars(product.rating) + '</div><span style="color:var(--text-secondary);font-size:0.95rem">' + product.rating + ' (' + product.reviews + ' reviews)</span></div><div style="display:flex;align-items:baseline;gap:12px;margin-bottom:6px"><span style="font-size:2.2rem;font-weight:800;color:var(--primary-dark)">' + formatPrice(product.price) + '</span>' + (product.originalPrice ? '<span style="font-size:1.1rem;color:var(--text-muted);text-decoration:line-through">' + formatPrice(product.originalPrice) + '</span>' : '') + '</div>' + (discount > 0 ? '<div style="color:var(--accent);font-weight:700;font-size:0.9rem;margin-bottom:16px">You save ' + formatPrice(product.originalPrice - product.price) + '</div>' : '<div style="margin-bottom:16px"></div>') + '<p style="color:var(--text-secondary);margin-bottom:24px;line-height:1.8;font-size:0.98rem">' + product.description + '</p><div style="margin-bottom:20px"><span style="display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:0.88rem;font-weight:600;' + (product.stock > 0 ? 'background:rgba(15,157,88,0.1);color:var(--accent)' : 'background:rgba(239,68,68,0.1);color:var(--danger)') + '">' + (product.stock > 0 ? '✓ In Stock (' + product.stock + ' available)' : '✗ Out of Stock') + '</span></div><div style="display:flex;align-items:center;gap:14px;margin-bottom:28px;flex-wrap:wrap"><div class="quantity-control"><button onclick="changeQty(-1)">−</button><input type="number" id="productQty" value="1" min="1" max="' + product.stock + '"><button onclick="changeQty(1)">+</button></div><button class="btn btn-primary btn-lg" onclick="addProductToCart(\'' + product.id + '\')" ' + (product.stock === 0 ? 'disabled' : '') + ' style="flex:1;min-width:180px"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>Add to Cart</button><button class="btn btn-secondary btn-icon" onclick="toggleWishlistBtn(\'' + product.id + '\', this)" title="Wishlist" style="width:50px;height:50px;border-radius:50%">' + (isWishlisted ? ICONS.heartFilled : ICONS.heart) + '</button></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px"><div style="display:flex;align-items:center;gap:10px;padding:14px;background:var(--bg-secondary);border-radius:var(--radius-sm);font-size:0.88rem;color:var(--text-secondary)"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="var(--accent)" stroke-width="2"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>Free Delivery</div><div style="display:flex;align-items:center;gap:10px;padding:14px;background:var(--bg-secondary);border-radius:var(--radius-sm);font-size:0.88rem;color:var(--text-secondary)"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="var(--accent)" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Genuine Warranty</div><div style="display:flex;align-items:center;gap:10px;padding:14px;background:var(--bg-secondary);border-radius:var(--radius-sm);font-size:0.88rem;color:var(--text-secondary)"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="var(--accent)" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>7-Day Returns</div><div style="display:flex;align-items:center;gap:10px;padding:14px;background:var(--bg-secondary);border-radius:var(--radius-sm);font-size:0.88rem;color:var(--text-secondary)"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="var(--accent)" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="4" y1="10" x2="20" y2="10"/></svg>SKU: ' + product.sku + '</div></div></div></div><div style="margin-top:48px"><div class="tab-nav scroll-animate" id="productTabs"><button class="tab-btn active" onclick="showTab(\'specs\')">Specifications</button><button class="tab-btn" onclick="showTab(\'reviews\')">Reviews (' + product.reviews + ')</button></div><div id="tabSpecs"><table style="width:100%;border-collapse:collapse;background:#fff;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border-glass)">' + specsHtml + '</table></div><div id="tabReviews" style="display:none"><div class="review-card"><div class="review-header"><div class="review-author"><div class="review-avatar">AK</div><div><strong>Ahmed Khan</strong><br><span style="color:var(--text-muted);font-size:0.83rem">Verified Buyer</span></div></div><div class="review-stars">' + renderStars(5) + '</div></div><p class="review-text">Excellent product! Very satisfied with the quality and performance. Delivery was fast and packaging was secure. Highly recommended.</p><div class="review-date">2 weeks ago</div></div><div class="review-card"><div class="review-header"><div class="review-author"><div class="review-avatar">SM</div><div><strong>Sara Malik</strong><br><span style="color:var(--text-muted);font-size:0.83rem">Verified Buyer</span></div></div><div class="review-stars">' + renderStars(4) + '</div></div><p class="review-text">Great value for money. Works exactly as described. Minor delivery delay but the product itself is fantastic.</p><div class="review-date">1 month ago</div></div><div class="review-card"><div class="review-header"><div class="review-author"><div class="review-avatar">HR</div><div><strong>Hassan Raza</strong><br><span style="color:var(--text-muted);font-size:0.83rem">Verified Buyer</span></div></div><div class="review-stars">' + renderStars(5) + '</div></div><p class="review-text">Best purchase this year. SastaElectronics delivered exactly what was promised. Will definitely order again.</p><div class="review-date">1 month ago</div></div></div></div>';
      const related = getProducts().filter(p => p.category === product.category && p.id !== product.id).slice(0, 4);
      document.getElementById('relatedGrid').innerHTML = related.map(renderProductCard).join('');
    }
    function changeQty(d) { const i = document.getElementById('productQty'); i.value = Math.max(1, Math.min(product.stock, Number(i.value) + d)); }
    function addProductToCart(id) { const q = Number(document.getElementById('productQty').value) || 1; Cart.add(id, q); showToast(product.name + ' (x' + q + ') added to cart', 'success'); }
    function toggleWishlistBtn(id, btn) { const isNow = Wishlist.toggle(id); btn.innerHTML = isNow ? ICONS.heartFilled : ICONS.heart; }
    function showTab(tab) { document.getElementById('tabSpecs').style.display = tab === 'specs' ? 'block' : 'none'; document.getElementById('tabReviews').style.display = tab === 'reviews' ? 'block' : 'none'; document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', (tab === 'specs' && i === 0) || (tab === 'reviews' && i === 1))); }
  </script>
</body>

</html>
